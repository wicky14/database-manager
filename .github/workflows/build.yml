name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller build.spec --noconfirm --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-manager-linux
          path: dist/database-manager

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/database-manager
          generate_release_notes: true

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller build.spec --noconfirm --clean

      - name: Set version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          echo "value=${tag:-1.0.0}" >> "$GITHUB_OUTPUT"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Build installer
        run: ISCC /DMyAppVersion="${{ steps.version.outputs.value }}" installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: database-manager-windows
          path: dist/Setup*.exe

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: database-manager-windows-portable
          path: dist/database-manager.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Setup*.exe
            dist/database-manager.exe
          generate_release_notes: true
